name: volunteer-app

services:
  postgres:
    image: postgres:18.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_DEBUG: ${APP_DEBUG:-0}
      APP_SECRET: ${APP_SECRET:-change-me}
      DATABASE_URL: ${DATABASE_URL:-pgsql://postgres:postgres@postgres:5432/postgres}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailhog:1025}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test:
        - CMD-SHELL
        - pidof php-fpm84 >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./resources/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  adminer:
    image: adminer:5.4.2-standalone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-9090}:8080"

  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

volumes:
  postgres_data:
