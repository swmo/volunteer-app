name: volunteer-app-prod

services:
  postgres:
    image: postgres:18.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    user: "nobody:nobody"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      MAILER_DSN: ${MAILER_DSN}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      BOOTSTRAP_ORGANISATION_NAME: ${BOOTSTRAP_ORGANISATION_NAME}
    healthcheck:
      test:
        - CMD-SHELL
        - pidof php-fpm84 >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      SSL_CERTIFICATE: ${SSL_CERTIFICATE:-/etc/letsencrypt/live/localhost/fullchain.pem}
      SSL_CERTIFICATE_KEY: ${SSL_CERTIFICATE_KEY:-/etc/letsencrypt/live/localhost/privkey.pem}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./resources/nginx/prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ./:/var/www:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q --spider --no-check-certificate https://127.0.0.1/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
